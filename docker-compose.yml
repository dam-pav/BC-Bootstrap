services:
  bc-bootstrap:
    build:
      context: .
      args:
        WINDOWS_TAG: ${WINDOWS_TAG:-ltsc2022}
        BCCONTAINERHELPER_VERSION: ${BCCONTAINERHELPER_VERSION:-latest}
    image: bccontainerhelper-bootstrap:${WINDOWS_TAG:-ltsc2022}
    isolation: ${DOCKER_ISOLATION:-process}
    environment:
      HOST_DOCKER_PATH: ${HOST_DOCKER_PATH:-C:\docker\docker.exe}
      BCC_COMMAND: ${BCC_COMMAND:-New-BcContainer}
      BCC_CONFIG_FILE: ${BCC_CONFIG_FILE:-C:\bootstrap\config\bccontainerhelper.config.json}
      BCC_PARAMETERS_FILE: ${BCC_PARAMETERS_FILE:-C:\bootstrap\config\parameters.json}
      BCC_PARAMETERS_JSON: ${BCC_PARAMETERS_JSON:-}
      BCC_CREDENTIAL_USERNAME: ${BCC_CREDENTIAL_USERNAME:-}
      BCC_CREDENTIAL_PASSWORD: ${BCC_CREDENTIAL_PASSWORD:-}
      BCC_DRY_RUN: ${BCC_DRY_RUN:-false}
    volumes:
      # Bind-mount the host's docker.exe so the container uses the same CLI version as the host
      - ${HOST_DOCKER_PATH}:/Windows/System32/docker.exe:ro
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine
      - ./config:C:\bootstrap\config:ro
      # Keep this absolute path identical on the host and in this container.
      # That makes it valid both to BcContainerHelper and to the host Docker daemon.
      # NOTE: Ensure ${HOST_FILES_PATH} exists on the host before deploying.
      - ${HOST_FILES_PATH}:${HOST_FILES_PATH}
      - C:\ProgramData\BcContainerHelper:C:\ProgramData\BcContainerHelper
      - C:\bcartifacts.cache:C:\bcartifacts.cache
    restart: "no"
